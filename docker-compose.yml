services:
  postgres:
    image: postgres:15-alpine
    container_name: orki_db
    environment:
      POSTGRES_USER: orki
      POSTGRES_PASSWORD: orki
      POSTGRES_DB: orki_dev
    ports:
      - "5432:5432"
    volumes:
      - orki_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orki -d orki_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  orki_postgres_data:
